name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: extractions/setup-just@v3
      - name: Install jj (required by `just ci` -> ensure-clean / check-translations)
        run: |
          URL=$(curl -fsSL https://api.github.com/repos/jj-vcs/jj/releases/latest \
                | jq -r '.assets[] | select(.name | test("x86_64-unknown-linux-musl\\.tar\\.gz$")) | .browser_download_url' \
                | head -1)
          test -n "$URL"
          mkdir -p "$RUNNER_TEMP/jj-extract"
          curl -fsSL "$URL" -o "$RUNNER_TEMP/jj.tar.gz"
          tar -xzf "$RUNNER_TEMP/jj.tar.gz" -C "$RUNNER_TEMP/jj-extract"
          sudo install "$RUNNER_TEMP/jj-extract/jj" /usr/local/bin/jj
          jj --version
      - name: Install Claude Code via bun (for `claude plugin validate`)
        run: |
          bun add -g @anthropic-ai/claude-code
          echo "$(bun pm bin -g)" >> "$GITHUB_PATH"
      - run: just ci
